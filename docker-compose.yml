version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: tablemaster-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - tablemaster-network

  app:
    build: .
    container_name: tablemaster-app
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/restaurant-reservation
      - JWT_SECRET=prod_jwt_secure_key_987654321_change_me
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5000
    depends_on:
      - mongodb
    networks:
      - tablemaster-network

volumes:
  mongo-data:

networks:
  tablemaster-network:
    driver: bridge
